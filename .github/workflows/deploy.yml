name: Déploiement sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du déploiement manuel (ex: nouveaux dessins approuvés)"
        required: false
        default: "Mise à jour manuelle"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Construction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Installer ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Installer just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: Installer les dépendances Python pour le stockage R2
        if: env.DRAWING_STORAGE == 'r2'
        run: pip install boto3

      - name: Récupérer les dessins depuis le stockage externe
        env:
          DRAWING_STORAGE: ${{ vars.DRAWING_STORAGE }}
          # Nextcloud (apps.education.fr)
          NEXTCLOUD_URL: ${{ secrets.NEXTCLOUD_URL }}
          NEXTCLOUD_USER: ${{ secrets.NEXTCLOUD_USER }}
          NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
          # Cloudflare R2
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ vars.R2_PREFIX }}
        run: python3 scripts/fetch-drawings.py

      - name: Construire le site
        run: just build

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: dist

  deploy:
    name: Déploiement
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
